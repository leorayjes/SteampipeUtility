AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Deploys the AWS_HEALTHCHECK_COLLECTOR IAM role with the ReadOnlyAccess
  managed policy. The role trusts the SHI delivery SSO principal and requires
  an External ID for assumption.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 1
    Description: >
      External ID that must be supplied when assuming the AWS_HEALTHCHECK_COLLECTOR
      role. Keep this value secret and share it only with the trusted principal.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:
  HealthCheckCollectorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AWS_HEALTHCHECK_COLLECTOR
      Description: >
        Read-only role assumed by the SHI AWS Delivery SSO principal for
        health-check and inventory collection via Steampipe.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowSHIDeliveryAssumption
            Effect: Allow
            Principal:
              AWS: arn:aws:iam::330251033110:role/aws-reserved/sso.amazonaws.com/AWSReservedSSO_ShiAwsDelivery_b0abf73ecd6b240f
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Tags:
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: SteampipeHealthCheckCollector

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  RoleName:
    Description: Name of the created IAM role.
    Value: !Ref HealthCheckCollectorRole

  RoleArn:
    Description: ARN of the created IAM role.
    Value: !GetAtt HealthCheckCollectorRole.Arn
